# Coolify Nixpacks uses an older default nixpkgs archive without nodejs_24.
# Pin a newer archive so Node 22/24 builds succeed.
[phases.setup]
nixpkgsArchive = "23f9169c4ccce521379e602cc82ed873a1f1b52b"

[phases.install]
cmds = [
  "npm ci --prefix backend --omit=dev",
  "npm ci --prefix frontend"
]

[phases.build]
cmds = ["npm run build --prefix frontend"]

[start]
cmd = "node backend/src/index.js"
